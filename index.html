      * {

      html,

      body {

      }

        right: auto;

      }
      svg a text {
        text-decoration: none;
      }
      svg a.em text {
        fill: #e5392b;
      }
      svg a:hover text {
        text-decoration: underline;
      }
      ::selection {
        background: #111;
        color: #fff;
      }
      svg text::selection {
        fill: #fff;
      }
      svg a:hover text {
        text-decoration: underline;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* fixed top menu — same as thesis/funding pages so THESIS/FUNDING matches exactly */
      .bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 3.6rem 5.4% 1.3rem;
        line-height: 1.6;
        font-family: "Outfit", system-ui, sans-serif;
      }
      .bar > a {
        color: #111;
        letter-spacing: -0.01em;
        font-size: 1.2rem;
        font-weight: 600;
        text-decoration: none;
        visibility: hidden;
      }
      .bar-right {
        display: flex;
        align-items: center;
        gap: 1.25rem;
      }
      .bar-right a {
        color: #111;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 1rem;
        font-weight: 300;
        text-decoration: none;
        pointer-events: auto;
      }
      .bar-right a:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      @media (max-aspect-ratio: 4/5), (max-width: 700px) {
        .bar {
          display: none !important;
        }
      }
    </style>
